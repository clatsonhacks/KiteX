specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: KitexAuditLog
    network: kite-ai
    source:
      address: "0x2725111582b68539DF62d57F579EAfCEbFb870b0"
      abi: KitexAuditLog
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - AgentEvent
        - LPEvent
        - ArbEvent
        - HedgeEvent
        - ReputationEvent
        - Agent
      abis:
        - name: KitexAuditLog
          file: KitexAuditLog/KitexAuditLog.json
      eventHandlers:
        - event: LPPositionOpened(indexed bytes32,address,int24,int24,uint128,uint256)
          handler: handleLPPositionOpened
        - event: LPPositionClosed(indexed bytes32,uint256,uint256,uint256)
          handler: handleLPPositionClosed
        - event: LPPositionRebalanced(indexed bytes32,int24,int24,int24,int24,uint256)
          handler: handleLPPositionRebalanced
        - event: ArbitrageExecuted(indexed bytes32,address,address,uint256,uint256,int256,uint256)
          handler: handleArbitrageExecuted
        - event: ArbitrageFailed(indexed bytes32,string,uint256)
          handler: handleArbitrageFailed
        - event: HedgeIntentLogged(indexed bytes32,int256,string,uint256)
          handler: handleHedgeIntentLogged
        - event: ReputationUpdated(indexed bytes32,uint256,uint256,string,uint256)
          handler: handleReputationUpdated
      file: KitexAuditLog/KitexAuditLog.wasm
  - kind: ethereum
    name: AlgebraPool
    network: kite-ai
    source:
      address: "0xfB971C3200c3DB4Ef23F991D2d1F0D329A1Bf036"
      abi: AlgebraPool
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PoolSwap
      abis:
        - name: AlgebraPool
          file: AlgebraPool/AlgebraPool.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,int256,int256,uint160,uint128,int24)
          handler: handleSwap
      file: KitexAuditLog/KitexAuditLog.wasm
